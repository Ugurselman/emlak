async function loadData(){
  const tid=currentProfile.tenant_id;
  const r=currentProfile.role;
  try{
    let pq=sb.from('portfolio').select('*').eq('tenant_id',tid);
    let tq=sb.from('talepler').select('*').eq('tenant_id',tid);
    let mq=sb.from('musteriler').select('*').eq('tenant_id',tid);
    let kq=sb.from('komisyonlar').select('*').eq('tenant_id',tid);
    // Danışman sadece kendi müşteri ve komisyonlarını görür (başlangıçta)
    if(r==='danisman'){
      mq=mq.eq('user_id',currentUser.id);
      kq=kq.eq('user_id',currentUser.id);
    }
    const[p,t,m,k]=await Promise.all([pq,tq,mq,kq]);
    portfolio=(p.data||[]).map(r=>({...r.data,_rid:r.id,_uid:r.user_id,_created:r.created_at}));
    talepler=(t.data||[]).map(r=>({...r.data,_rid:r.id,_uid:r.user_id}));
    musteriler=(m.data||[]).map(r=>({...r.data,_rid:r.id,_uid:r.user_id}));
    komisyonlar=(k.data||[]).map(r=>({...r.data,_rid:r.id,_uid:r.user_id}));
    // Kullanıcılar

async function doInviteRegister(){
  const btn=el('i_btn');btn.disabled=true;btn.textContent=i18n('registering');
  const name=el('i_name').value.trim();
  const tel=el('i_tel').value.trim();
  const pass=el('i_pass').value;
  const pass2=el('i_pass2').value;
  if(!name){el('i_err').innerHTML='<div class="auth-err">Ad soyad zorunlu</div>';btn.disabled=false;btn.textContent='Hesabımı Oluştur';return;}
  if(pass.length<6){el('i_err').innerHTML='<div class="auth-err">Şifre en az 6 karakter olmalı</div>';btn.disabled=false;btn.textContent='Hesabımı Oluştur';return;}
  if(pass!==pass2){el('i_err').innerHTML='<div class="auth-err">Şifreler eşleşmiyor</div>';btn.disabled=false;btn.textContent='Hesabımı Oluştur';return;}
  // Şifreyi güncelle
  const{data:userData,error:passErr}=await sb.auth.updateUser({password:pass,data:{full_name:name}});
  if(passErr){el('i_err').innerHTML=`<div class="auth-err">${passErr.message}</div>`;btn.disabled=false;btn.textContent='Hesabımı Oluştur';return;}
  // Davet bilgilerini al
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    const email=session.user.email;
    // invitations tablosundan tenant ve rol bilgisini al
    const{data:inv}=await sb.from('invitations').select('*').eq('email',email).is('used_at',null).order('created_at',{ascending:false}).limit(1);
    const invite=inv&&inv.length>0?inv[0]:null;
    if(invite){
      // Profili güncelle
      await sb.from('profiles').upsert({
        id:session.user.id,
        tenant_id:invite.tenant_id,
        full_name:name,
        role:invite.role,
        is_active:true,
        email:email,
        tel:tel
      });
      // Daveti kullanıldı olarak işaretle
      await sb.from('invitations').update({used_at:new Date().toISOString()}).eq('id',invite.id);
    } else {
      // Davet bulunamadı, profil zaten var mı kontrol et
      await sb.from('profiles').update({full_name:name}).eq('id',session.user.id);
    }
    // Temizle ve giriş yap
    window.history.replaceState({},'','/');
    await initSession(session);
  }
}

// ── EXCEL EXPORT ───────────────────────────────────────
function exportExcel(data,cols,filename,tid=null){
  // Eğer tablo ID verilmişse sadece görünür satırları al
  let exportData=data;
  if(tid){
    const tbl=el(tid);
    if(tbl){
      const visibleRids=new Set();
      tbl.querySelectorAll('tbody tr[data-row]:not(.hr)').forEach(row=>{
        // Her satırın data attribute'larından orijinal kaydı bul
        const fiyat=row.dataset.fiyat||row.dataset.butce||row.dataset.islem||row.dataset.net;
        visibleRids.add(row.innerHTML.substring(0,50));
      });
      // Görünür satır sayısına göre filtrele
      const visibleRows=tbl.querySelectorAll('tbody tr[data-row]:not(.hr)');
      const visibleIndices=new Set();
      visibleRows.forEach(row=>{
        const idx=Array.from(tbl.querySelectorAll('tbody tr[data-row]')).indexOf(row);
        visibleIndices.add(idx);
      });
      exportData=data.filter((_,i)=>visibleIndices.has(i));
    }
  }
  const rows=exportData.map(row=>cols.reduce((o,c)=>{o[c.label]=row[c.key]||'';return o;},{}));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Veri');
  XLSX.writeFile(wb,filename+'.xlsx');
}

// ── EXCEL FİLTRE ──────────────────────────────────────
function initF(tid){tableFilters[tid]=tableFilters[tid]||{};}
function toggleFI(tid,col){const w=el(`fi-${tid}-${col}`);if(!w)return;const v=w.style.display==='block';w.style.display=v?'none':'block';el(`fb-${tid}-${col}`)?.classList.toggle('on',!v);if(!v){fillDatalist(tid,col);const i=w.querySelector('input');if(i)i.focus();}}
function applyF(tid,col,val){initF(tid);tableFilters[tid][col]=val.toLowerCase().trim();el(`fb-${tid}-${col}`)?.classList.toggle('on',val.length>0);filterTbl(tid);updFC(tid);}
function filterTbl(tid){const tbl=el(tid);if(!tbl)return;const f=tableFilters[tid]||{};tbl.querySelectorAll('tbody tr[data-row]').forEach(row=>{let show=true;for(const[col,val] of Object.entries(f)){if(!val)continue;const attrVal=(row.getAttribute('data-'+col.toLowerCase())||row.getAttribute('data-'+col)||'').toLowerCase();if(!attrVal.includes(val)){show=false;break;}}row.classList.toggle('hr',!show);});}
function updFC(tid){const f=tableFilters[tid]||{};const count=Object.values(f).filter(v=>v).length;const badge=el(`fc-${tid}`);if(badge){badge.style.display=count>0?'flex':'none';badge.querySelector('.filter-badge').textContent=count+' '+i18n('filtersActive');}}
function clearF(tid){tableFilters[tid]={};const tbl=el(tid);if(!tbl)return;tbl.querySelectorAll('.th-finput input').forEach(i=>i.value='');tbl.querySelectorAll('.th-fi').forEach(b=>b.classList.remove('on'));tbl.querySelectorAll('.th-finput').forEach(w=>w.style.display='none');tbl.querySelectorAll('tbody tr[data-row]').forEach(r=>r.classList.remove('hr'));updFC(tid);}
function getColVals(tid,col){
  const tbl=el(tid);if(!tbl)return[];
  const vals=new Set();
  tbl.querySelectorAll('tbody tr[data-row]').forEach(row=>{
    const v=(row.getAttribute('data-'+col.toLowerCase())||row.getAttribute('data-'+col)||'').trim();
    if(v)vals.add(v);
  });
  return [...vals].sort();
}
function mTH(tid,col,label,w=''){
  const cur=tableFilters[tid]?.[col]||'';const on=cur.length>0;
  const dlId=`dl-${tid}-${col}`;
  return `<th${w?` style="width:${w}"`:''}><div class="th-inner"><span class="th-label">${label}</span><button class="th-fi${on?' on':''}" id="fb-${tid}-${col}" onclick="toggleFI('${tid}','${col}')"><i class="ti ti-filter"></i></button></div><div class="th-finput" id="fi-${tid}-${col}" style="display:none"><div style="display:flex;gap:3px"><input type="text" list="${dlId}" value="${cur}" placeholder="Yaz veya seç…" oninput="applyF('${tid}','${col}',this.value)" style="flex:1"><datalist id="${dlId}"></datalist><button onclick="clearOneF('${tid}','${col}')" style="padding:2px 5px;border:1px solid var(--bd);background:var(--sf2);border-radius:3px;cursor:pointer;font-size:11px;color:var(--tx2)">✕</button></div></div></th>`;
}
function clearOneF(tid,col){
  if(tableFilters[tid])tableFilters[tid][col]='';
  const inp=el(`fi-${tid}-${col}`)?.querySelector('input');
  if(inp)inp.value='';
  el(`fb-${tid}-${col}`)?.classList.remove('on');
  filterTbl(tid);updFC(tid);
}
function fillDatalist(tid,col){
  const dlId=`dl-${tid}-${col}`;
  const dl=el(dlId);if(!dl)return;
  const vals=getColVals(tid,col);
  dl.innerHTML=vals.map(v=>`<option value="${v}">`).join('');
}
function fBar(tid){return `<div class="filter-info" id="fc-${tid}" style="display:none"><span class="filter-badge"></span><button class="filter-clear" onclick="clearF('${tid}')">${i18n('clearFilter')}</button></div>`;}

// ── KOMİSYON ──────────────────────────────────────────
function komCalc(liste){
  const now=new Date();
  const tm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const ty=String(now.getFullYear());
  const pm=new Date(now.getFullYear(),now.getMonth()-1,1);
  const pms=`${pm.getFullYear()}-${String(pm.getMonth()+1).padStart(2,'0')}`;
  const tQ=Math.floor(now.getMonth()/3);
  const pQM=[],tQM=[];
  for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),tQ*3-3+i,1);pQM.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}
  for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),tQ*3+i,1);tQM.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}
  const py=String(now.getFullYear()-1);
  const sum=arr=>arr.reduce((s,k)=>s+parseInt(k.netKomisyon||0),0);
  const sf=(arr,f)=>arr.reduce((s,k)=>s+parseInt(k[f]||0),0);
  const pct=(a,b)=>b===0?null:Math.round((a-b)/b*100);
  return{thisMonth:sum(liste.filter(k=>k.tarih===tm)),thisYear:sum(liste.filter(k=>k.tarih?.startsWith(ty))),total:sum(liste),count:liste.length,topEk:sf(liste,'ekleme'),topIs:sf(liste,'iskonto'),
    mGrow:pct(sum(liste.filter(k=>k.tarih===tm)),sum(liste.filter(k=>k.tarih===pms))),
    qGrow:pct(sum(liste.filter(k=>tQM.includes(k.tarih))),sum(liste.filter(k=>pQM.includes(k.tarih)))),
    yGrow:pct(sum(liste.filter(k=>k.tarih?.startsWith(ty))),sum(liste.filter(k=>k.tarih?.startsWith(py))))};
}
function gCard(label,val){const cls=val===null?'nt':(val>=0?'up':'dn');const ico=val===null?'ti-minus':(val>=0?'ti-trending-up':'ti-trending-down');const txt=val===null?i18n('noData'):(val>=0?`+${val}%`:`${val}%`);return `<div class="gc ${cls}"><div class="gcl"><div class="gct">${label}</div><div class="gcv">${txt}</div></div><i class="ti ${ico} gci"></i></div>`;}

function buildChart(){
  const canvas=el('komChart');if(!canvas)return;
  const now=new Date();const months=[],labels=[];
  for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);labels.push(i18n('months')[d.getMonth()]);}
  const data=months.map(m=>komisyonlar.filter(k=>k.tarih===m).reduce((s,k)=>s+parseInt(k.netKomisyon||0),0));
  if(chartInst)chartInst.destroy();
  chartInst=new Chart(canvas,{type:'bar',data:{labels,datasets:[{type:'bar',label:i18n('colNet'),data,backgroundColor:'rgba(26,82,118,0.15)',borderColor:'rgba(26,82,118,0.4)',borderWidth:1,borderRadius:4,order:2},{type:'line',label:'Trend',data,borderColor:'#1a5276',borderWidth:2,pointBackgroundColor:'#1a5276',pointRadius:3,tension:0.3,fill:false,order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' ₺'+parseInt(ctx.raw||0).toLocaleString('tr-TR')}}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'#f0f2f5'},ticks:{font:{size:10},callback:v=>'₺'+parseInt(v).toLocaleString('tr-TR')}}}}});
}

async function deleteTenant(id){
  const t=tenants.find(t=>t.id===id);
  const tUsers=users.filter(u=>u.tenant_id===id);
  if(tUsers.length>0){
    alert(`Bu şirkette ${tUsers.length} kullanıcı var. Silmeden önce kullanıcıları kaldırın.`);
    return;
  }
  if(!confirm(`"${t?.name}" şirketini silmek istediğinizden emin misiniz?`))return;
  const{error}=await sb.from('tenants').delete().eq('id',id);
  if(error){alert('Silme hatası: '+error.message);return;}
  tenants=tenants.filter(t=>t.id!==id);
  toast(i18n('companyDeleted'));
  render();
}

async function toggleTenant(id,isActive){
  await sb.from('tenants').update({is_active:!isActive}).eq('id',id);
  const t=tenants.find(t=>t.id===id);if(t)t.is_active=!isActive;
  toast(isActive?'Pasifleştirildi':'Aktifleştirildi');render();
}
async function toggleUser(uid,isActive){
  await sb.from('profiles').update({is_active:!isActive}).eq('id',uid);
  const u=users.find(u=>u.id===uid);if(u)u.is_active=!isActive;
  toast(isActive?'Kullanıcı pasifleştirildi':'Kullanıcı aktifleştirildi');render();
}

  if(type==='rol'){

  if(type==='portfolio'&&item?.il)setTimeout(()=>ilceDoldur('f_il','f_ilce',item.ilce||''),10);

function closeModal(){const e=el('modal-overlay');if(e)e.remove();modalType=null;editId=null;document.removeEventListener('click',acOut);}
function updDurumOpts(){
  const tip=sv('f_tip');
  const sk=el('f_durum_k');const sa=el('f_durum_a');
  if(sk)sk.innerHTML=durumOpts(tip,'Aktif');
  if(sa)sa.innerHTML=durumOpts(tip,'Aktif');
}
function mTK(v){const isA=v==='Arsa';el('sk')?.classList.toggle('hidden',isA);el('sa')?.classList.toggle('hidden',!isA);}
function mTN(v){el('sna')?.classList.toggle('hidden',v!=='Diğer');}
function tTK(v){const isA=v===i18n('land');el('tk')?.classList.toggle('hidden',isA);el('ta2')?.classList.toggle('hidden',!isA);}
function tTN(v){el('taa')?.classList.toggle('hidden',v!==i18n('qualityOther'));}
function acS(q){const l=el('acl');if(!l)return;if(!q){l.style.display='none';return;}const fil=musteriler.filter(m=>m.ad.toLowerCase().includes(q.toLowerCase())||(m.tel||'').includes(q));if(!fil.length){l.style.display='none';return;}l.innerHTML=fil.map(m=>`<div class="ac-item" onclick="acSel('${m._rid}','${m.ad.replace(/'/g,"\\'")}')"><div class="ac-name">${m.ad}</div><div class="ac-tel">${m.tel||''}</div></div>`).join('');l.style.display='block';}
function acSel(rid,ad){const i=el('f_mi'),h=el('f_mid'),l=el('acl');if(i)i.value=ad;if(h)h.value=rid;if(l)l.style.display='none';}
function acOut(e){const l=el('acl');if(l&&!l.contains(e.target)&&e.target.id!=='f_mi')l.style.display='none';}
function kAC(){
  const t=parseInt(parseFiyat(el('f_islem')?.value||'0'));
  const tip=sv('f_tip');
  // Kiralama: kira tutarı kadar komisyon, Satış: %2
  const baz=tip===i18n('rental')?t:Math.round(t*0.02);
  const ek=parseInt(parseFiyat(el('f_ekleme')?.value||'0'));
  const is=parseInt(parseFiyat(el('f_iskonto')?.value||'0'));
  if(el('f_baz'))el('f_baz').value=fmtFiyat(baz);
  if(el('f_netk'))el('f_netk').value=fmtFiyat(baz+ek-is);
}

// ── KAYDET ─────────────────────────────────────────────

function updatePortfoyList(tip, curVal=''){
  const inp=el('f_portfoy');
  const dl=el('portfoy-list');
  if(!inp||!dl)return;
  // Mevcut değeri koru
  if(curVal)inp.value=curVal;
  let filtered=[];
  if(tip===i18n('sale')){
    filtered=portfolio.filter(p=>p.tip==='Satılık');
  } else if(tip===i18n('rental')){
    filtered=portfolio.filter(p=>p.tip==='Kiralık');
  } else {
    filtered=[...portfolio];
  }
  dl.innerHTML=filtered.map(p=>{
    const durumLabel=p.durum&&p.durum!==i18n('statusActive')?` (${p.durum})`:'';
    const lokasyon=p.il||p.ilce?` — ${[p.il,p.ilce].filter(Boolean).join('/')}`:'' ;
    return `<option value="${p.baslik}">${p.baslik}${durumLabel}${lokasyon}</option>`;
  }).join('');
}

async function saveItem(){
  const btn=el('save-btn');if(btn){btn.disabled=true;btn.textContent=i18n('registering');}
  try{
    const ownerUid=sv('f_owner')||currentUser.id;
    if(modalType==='portfolio'){
      const kat=sv('f_kat');const isA=kat==='Arsa';
      if(!sv('f_baslik')){alert(i18n('titleRequired'));return;}
      const fiyatRaw=parseFiyat(sv('f_fiyat'));
      const obj={
        tip:sv('f_tip'),kategori:kat,konutTip:isA?'':sv('f_kt'),
        baslik:sv('f_baslik'),il:sv('f_il'),ilce:sv('f_ilce'),adresDetay:sv('f_adres'),
        brut:isA?'0':sv('f_brut')||'0',net:isA?'0':sv('f_net')||'0',
        alanK:isA?'0':sv('f_alan_k')||'0',alan:isA?sv('f_alan_a')||'0':'0',
        fiyat:fiyatRaw,
        durum:isA?sv('f_durum_a'):sv('f_durum_k'),
        musteriId:el('f_mid')?el('f_mid').value:'',musteriAd:sv('f_mi'),not:sv('f_not'),
        nitelik:isA?sv('f_nitelik'):'',nitelikAciklama:isA?sv('f_na'):'',
        mahalle:isA?sv('f_mahalle'):'',ada:isA?sv('f_ada'):'',parsel:isA?sv('f_parsel'):''
      };
      if(editId){
        const{error}=await sb.from('portfolio').update({data:obj,user_id:ownerUid}).eq('id',parseInt(editId));
        if(error)throw error;
        portfolio=portfolio.map(p=>p._rid==editId?{...obj,_rid:editId,_uid:ownerUid}:p);
      } else {
        const r=await dbInsert('portfolio',obj,ownerUid);portfolio.push(r);
      }
    }
    else if(modalType==='talep'){
      if(!sv('f_musteri')){alert(i18n('customerRequired'));return;}
      const kat=sv('f_kat');const isA=kat===i18n('land');
      const obj={musteri:sv('f_musteri'),tarih:sv('f_tarih'),tip:sv('f_tip'),kategori:kat,konutTip:isA?'':sv('f_kt'),arsaNitelik:isA?sv('f_an'):'',arsaNitelikAciklama:isA?sv('f_ana'):'',bolge:sv('f_bolge'),butce:parseFiyat(sv('f_butce')),detay:sv('f_detay'),durum:sv('f_durum')};
      if(editId){
        const{error}=await sb.from('talepler').update({data:obj,user_id:ownerUid}).eq('id',parseInt(editId));
        if(error)throw error;
        talepler=talepler.map(t=>t._rid==editId?{...obj,_rid:editId,_uid:ownerUid}:t);
      } else {const r=await dbInsert('talepler',obj,ownerUid);talepler.push(r);}
    }
    else if(modalType==='musteri'){
      if(!sv('f_ad')){alert('Ad zorunlu');return;}
      const obj={ad:sv('f_ad'),tip:sv('f_tip'),tel:sv('f_tel'),email:sv('f_email'),not:sv('f_not')};
      if(editId){await dbUpdate('musteriler',editId,obj);musteriler=musteriler.map(m=>m._rid==editId?{...obj,_rid:editId,_uid:m._uid}:m);}
      else{const r=await dbInsert('musteriler',obj);musteriler.push(r);}
    }
    else if(modalType==='komisyon'){
      const islemRaw=parseFiyat(sv('f_islem'));
      if(!islemRaw){alert(i18n('amountRequired'));return;}
      const portfoyVal=sv('f_portfoy');
      if(!portfoyVal){alert(i18n('portfolioRequired'));return;}
      const tipKom=sv('f_tip');
      const baz=tipKom===i18n('rental')?parseInt(islemRaw):Math.round(parseInt(islemRaw)*0.02);
      const ek=parseInt(parseFiyat(sv('f_ekleme'))||0);
      const is=parseInt(parseFiyat(sv('f_iskonto'))||0);
      // Portföy adından il/ilçe bilgisini al
      const selPortfoy=portfolio.find(p=>p.baslik===portfoyVal.split(' — ')[0]);
      const obj={tarih:sv('f_tarih'),tip:sv('f_tip'),portfoyAd:portfoyVal.split(' — ')[0],musteriAd:sv('f_musteri'),islemTutari:islemRaw,bazKomisyon:String(baz),ekleme:String(ek),iskonto:String(is),netKomisyon:String(baz+ek-is),not:sv('f_not')};
      if(editId){
        const{error}=await sb.from('komisyonlar').update({data:obj,user_id:ownerUid}).eq('id',parseInt(editId));
        if(error)throw error;
        komisyonlar=komisyonlar.map(k=>k._rid==editId?{...obj,_rid:editId,_uid:ownerUid}:k);
      } else {const r=await dbInsert('komisyonlar',obj,ownerUid);komisyonlar.push(r);}
    }
    else if(modalType==='davet'){
      if(!sv('f_email')){alert('E-posta zorunlu');return;}
      // Kullanıcı limiti kontrolü
      const tidCheck=currentProfile.tenant_id;
      const tenantCheck=tenants.find(t=>t.id===tidCheck)||currentTenant;
      const maxUCheck=tenantCheck?.max_users||999;
      const curUCheck=users.filter(u=>u.tenant_id===tidCheck).length;
      if(curUCheck>=maxUCheck){
        alert('Kullanıcı limitiniz doldu. Daha fazla kullanıcı eklemek için panel yönetimiyle görüşün.');
        return;
      }
      // Daveti invitations tablosuna kaydet
      const invData={
        email:sv('f_email'),
        full_name:sv('f_ad'),
        role:sv('f_rol'),
        tenant_id:currentProfile.tenant_id,
        created_by:currentUser.id
      };
      const{error:invErr}=await sb.from('invitations').insert(invData);
      if(invErr){alert('Davet kaydedilemedi: '+invErr.message);return;}
      // Supabase magic link ile davet maili gönder
      const siteUrl=window.location.origin;
      const{error:magicErr}=await sb.auth.signInWithOtp({
        email:sv('f_email'),
        options:{
          emailRedirectTo:siteUrl+'?invite=1',
          data:{full_name:sv('f_ad'),invited_role:sv('f_rol'),tenant_id:currentProfile.tenant_id}
        }
      });
      if(magicErr){alert('Davet maili gönderilemedi: '+magicErr.message);return;}
      toast(i18n('userAdded'));
    }
    else if(modalType==='rol'){
      const newRol=sv('f_rol');
      await sb.from('profiles').update({role:newRol}).eq('id',editId);
      const u=users.find(u=>u.id===editId);if(u)u.role=newRol;
      toast(i18n('roleUpdated'));
    }
    else if(modalType==='sirket'){
      const sName=sv('f_sirket');
      const maxUsers=parseInt(sv('f_maxusers')||'1');
      const isAktif=sv('f_aktif')==='true';
      if(!sName){alert('Şirket adı zorunlu');return;}
      if(editId){
        // Düzenleme modu
        const{error:updErr}=await sb.from('tenants').update({name:sName,max_users:maxUsers,is_active:isAktif}).eq('id',editId);
        if(updErr){alert('Güncelleme hatası: '+updErr.message);return;}
        const t=tenants.find(t=>t.id===editId);
        if(t){t.name=sName;t.max_users=maxUsers;t.is_active=isAktif;}
        toast(i18n('companyUpdated'));
      } else {
        // Yeni şirket
        const adName=sv('f_ad'),email=sv('f_email');
        if(!email){alert(i18n('brokerEmailRequired'));return;}
        const{data:ten,error:tenErr}=await sb.from('tenants').insert({name:sName,max_users:maxUsers,is_active:isAktif}).select().single();
        if(tenErr){alert('Şirket oluşturulamadı: '+tenErr.message);return;}
        const{error:invErr}=await sb.from('invitations').insert({email,full_name:adName,role:'broker',tenant_id:ten.id,created_by:currentUser.id});
        if(invErr){alert('Davet kaydedilemedi: '+invErr.message);return;}
        const{error:magicErr}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.origin,data:{full_name:adName,invited_role:'broker',tenant_id:ten.id}}});
        if(magicErr){alert('Davet maili gönderilemedi: '+magicErr.message);return;}
        tenants.push({...ten,max_users:maxUsers});
        toast('Şirket oluşturuldu, Broker\'a davet maili gönderildi ✓');
      }
    }
    closeModal();syncBar(i18n('saved'));render();
  }catch(e){syncBar(i18n('errorSave')+' '+e.message,true);alert('Hata: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent='Kaydet';}}
}

// ── SİL ────────────────────────────────────────────────
async function delItem(type,rid){
  if(!canDelete()){toast('Silme yetkiniz yok','ti-alert-circle');return;}
  if(!confirm(i18n('confirmDelete')))return;
  try{
    const tblMap={portfolio:'portfolio',talep:'talepler',musteri:'musteriler',komisyon:'komisyonlar'};
    await dbDelete(tblMap[type],rid);
    if(type==='portfolio')portfolio=portfolio.filter(p=>p._rid!=rid);
    if(type==='talep')talepler=talepler.filter(t=>t._rid!=rid);
    if(type==='musteri')musteriler=musteriler.filter(m=>m._rid!=rid);
    if(type==='komisyon')komisyonlar=komisyonlar.filter(k=>k._rid!=rid);
    toast(i18n('deleted').replace('☁ ',''));syncBar(i18n('deleted'));render();
  }catch(e){syncBar(i18n('errorDelete'),true);}
}

// ── BAŞLAT ─────────────────────────────────────────────
async function initSession(session){
  currentUser=session.user;
  const{data:profiles}=await sb.from('profiles').select('*').eq('id',currentUser.id);
  const profile=profiles&&profiles.length>0?profiles[0]:null;
  if(!profile){renderAuth('login','Hesabınız henüz yapılandırılmamış. Yöneticinizle iletişime geçin.');return;}
  if(profile.is_active===false){renderAuth('login',i18n('accountPassive'));return;}
  // Superadmin için tenant_id yoksa varsayılan ata
  if(!profile.tenant_id&&profile.role==='superadmin'){profile.tenant_id='00000000-0000-0000-0000-000000000001';}
  if(!profile.tenant_id){renderAuth('login','Hesabınız henüz yapılandırılmamış. Yöneticinizle iletişime geçin.');return;}
  currentProfile={...profile,email:currentUser.email};
  const{data:tenantArr}=await sb.from('tenants').select('*').eq('id',profile.tenant_id);
  currentTenant=tenantArr&&tenantArr.length>0?tenantArr[0]:null;
  await loadData();
  renderApp();
}

(async()=>{
  // URL hash kontrolü (şifre sıfırlama veya magic link)
  const hash=window.location.hash;
  if(hash&&hash.includes('access_token')){
    const params=new URLSearchParams(hash.substring(1));
    const accessToken=params.get('access_token');
    const refreshToken=params.get('refresh_token');
    const linkType=params.get('type');
    if(accessToken){
      await sb.auth.setSession({access_token:accessToken,refresh_token:refreshToken||''});
      if(linkType==='recovery'){
        renderPasswordReset();
        return;
      }
      if(linkType==='magiclink'){
        // Davet mi kontrol et
        const{data:{user}}=await sb.auth.getUser();
        if(user){
          const{data:profiles}=await sb.from('profiles').select('*').eq('id',user.id);
          const profile=profiles&&profiles.length>0?profiles[0]:null;
          if(!profile||!profile.tenant_id){
            const{data:inv}=await sb.from('invitations').select('*').eq('email',user.email).is('used_at',null).order('created_at',{ascending:false}).limit(1);
            if(inv&&inv.length>0){
              renderInviteRegister();
              return;
            }
          }
        }
      }
    }
  }
  const{data:{session}}=await sb.auth.getSession();
  if(session)await initSession(session);
  else renderAuth('login');
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='PASSWORD_RECOVERY'){
      renderPasswordReset();
      return;
    }
    if(event==='SIGNED_IN'&&session){
      if(document.getElementById('reset-form'))return;
      if(document.getElementById('invite-form'))return;
      // Profil var mı ve tenant_id dolu mu kontrol et
      const{data:profiles}=await sb.from('profiles').select('*').eq('id',session.user.id);
      const profile=profiles&&profiles.length>0?profiles[0]:null;
      if(!profile||!profile.tenant_id){
        // Davet var mı bak
        const{data:inv}=await sb.from('invitations').select('*').eq('email',session.user.email).is('used_at',null).order('created_at',{ascending:false}).limit(1);
        if(inv&&inv.length>0){
          renderInviteRegister();
          return;
        }
        renderAuth('login','Hesabınız yapılandırılmamış. Yöneticinizle iletişime geçin.');
        return;
      }
      if(profile.is_active===false){
        await sb.auth.signOut();
        renderAuth('login',i18n('accountPassive'));
        return;
      }
      // Superadmin için tenant_id yoksa varsayılan ata
      if(!profile.tenant_id&&profile.role==='superadmin'){profile.tenant_id='00000000-0000-0000-0000-000000000001';}
      currentUser=session.user;
      currentProfile={...profile,email:session.user.email};
      const{data:tenantArr}=await sb.from('tenants').select('*').eq('id',profile.tenant_id);
      currentTenant=tenantArr&&tenantArr.length>0?tenantArr[0]:null;
      await loadData();
      renderApp();
    } else if(event==='SIGNED_OUT'){
      currentUser=null;currentProfile=null;currentTenant=null;renderAuth('login');
    }
  });
})();
</script>
